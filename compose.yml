services:
  web:
    build:
      context: .
      target: web
    ports:
      - "7712:7712"
    environment:
      PORT: 7712
      API_INTERNAL_URL: http://api:7713
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      target: api
    ports:
      - "7713:7713"
    environment:
      PORT: 7713
      DATABASE_URL: postgresql://basalt_ui_playground:${BASALT_UI_PLAYGROUND_DB_PASSWORD:?must be set}@postgres:5432/basalt_ui_playground
      # Set BETTER_AUTH_SECRET in your shell env or a .env file before running
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      BETTER_AUTH_URL: http://api:7713/api/auth
      ALLOWED_ORIGIN: http://localhost:7712
      OTEL_EXPORTER_OTLP_ENDPOINT: http://clickstack:4318
      OTEL_SERVICE_NAME: basalt-ui-playground-api
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: basalt_ui_playground
      POSTGRES_PASSWORD: ${BASALT_UI_PLAYGROUND_DB_PASSWORD:?must be set}
      POSTGRES_DB: basalt_ui_playground
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basalt_ui_playground"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # Optional: HyperDX ClickStack for observability (see vps/compose.dev.yml for full config).
  # Browser SDK and API both send OTLP to :4318. UI is on :8080 (mapped to 7707 locally).
  # Managed separately via vps/compose.dev.yml — uncomment to run as part of this stack.
  #
  # clickstack:
  #   image: clickhouse/clickstack-all-in-one:latest
  #   ports:
  #     - "7707:8080"   # HyperDX UI
  #     - "4317:4317"   # OTLP gRPC
  #     - "4318:4318"   # OTLP HTTP (browser SDK + API traces)

volumes:
  pgdata:
